services:
  db:
    image: postgres:15
    container_name: clia_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clia_network

  api:
    build: .
    container_name: clia_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - .:/app
      - ./exports:/app/exports
      - ./datasets:/app/datasets
    networks:
      - clia_network

  scheduler:
    build: .
    container_name: clia_scheduler
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: ["python", "-m", "app.core.scheduler"]
    volumes:
      - .:/app
      - ./exports:/app/exports
      - ./datasets:/app/datasets
    networks:
      - clia_network

volumes:
  pg_data:
    driver: local

networks:
  clia_network:
    driver: bridge
